<form spellcheck="false">
    <div class="machine-list">
        <span class="pe-2">{{ 'common.machine' | translate }}</span>
        <div ngbDropdown class="d-inline-block me-1">
            <button class="btn btn-secondary btn-sm" type="button" ngbDropdownToggle>
                <div class="machine-label">
                    {{ selectedMachineLabel }}
                </div>
            </button>
            <div ngbDropdownMenu>
                <button *ngFor="let machine of machines; let i = index" ngbDropdownItem type="button"
                    (click)="setSelectionFromLabel(machine)">
                    {{ machine }}
                </button>
                <div class="dropdown-divider"></div>
                <button ngbDropdownItem type="button" (click)="setSelectionFromLabel(null)">
                    {{ 'webmsx.settodefault' | translate }}
                </button>
            </div>
        </div>
    </div>
    <button class="btn btn-primary btn-sm mt-3" (click)="save()" (keyup.enter)="save()">
        {{ 'common.save' | translate }}
    </button>
</form>
